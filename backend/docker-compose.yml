version: '3.8'

services:
  # PostgreSQL removido para uso local com SQLite
  # Descomentar abaixo se usar Docker para produção

  app:
    build: .
    container_name: evento_app
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8080:8080"
    restart: unless-stopped
