services:
  # Backend Service (.NET)
  - type: web
    name: memuvie-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      # 🔐 Variáveis públicas apenas - Credenciais no Render Dashboard
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: FRONTEND_URL
        value: https://memuvie.vercel.app
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: UPLOAD_PATH
        value: /uploads/memuvie/
      # 🔒 Credenciais do PostgreSQL Render (já criado)
      - key: DB_HOST
        value: dpg-d7ghtle7r5hc73bage2g-a.virginia-postgres.render.com
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        value: memuvie_bd_user
      - key: DB_PASSWORD
        value: zDfHz1brgCcheWBKdfvd7WZZH76ZNd8h
      # 🔒 Adicionar no Render Dashboard (não no código):
      # - JWT_SECRET (gerar uma chave aleatória e segura)
      # - MAIL_USERNAME (seu-email@gmail.com)
      # - MAIL_PASSWORD (senha de app do Gmail)
      # - CLOUDINARY_API_SECRET (se usar Cloudinary com autenticação)
    healthCheckPath: /health

  # Frontend Service (Angular)
  - type: web
    name: memuvie-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /