services:
  # ─────────────────────────────────────────────────────────────
  # PRD – Backend Service (.NET)
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: memuvie-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      # 🔐 ASPNETCORE Configuration
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      
      # 🌐 Frontend Configuration
      - key: FRONTEND_URL
        value: https://memuvie.vercel.app
      
      # 📧 Email Configuration (public)
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_FROM
        value: noreply@memuvie.com
      
      # 💾 Storage Configuration
      - key: UPLOAD_PATH
        value: /uploads/memuvie/
      
      # 🔒 PostgreSQL Credentials (Render)
      - key: DB_HOST
        value: dpg-d7ghtle7r5hc73bage2g-a.virginia-postgres.render.com
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: evento_prd_db
      - key: DB_USER
        value: memuvie_bd_user
      - key: DB_PASSWORD
        value: zDfHz1brgCcheWBKdfvd7WZZH76ZNd8h
      
      # 🔒 MUST ADD IN RENDER DASHBOARD (do NOT add here):
      # - JWT_SECRET (gerar: https://tools.owasp.org/OWASP_Testing_Guide_v4)
      # - MAIL_USERNAME (seu-email@gmail.com)
      # - MAIL_PASSWORD (senha de app do Gmail)
      # - CLOUDINARY_CLOUD_NAME (optional)
      # - CLOUDINARY_API_KEY (optional)
      # - CLOUDINARY_API_SECRET (optional)
    
    healthCheckPath: /health
    healthCheckInterval: 30
    
    # Build command
    buildCommand: dotnet publish -c Release -o out --no-restore
    startCommand: dotnet EventoAPI.dll

  # ─────────────────────────────────────────────────────────────
  # HOMOLOG – Backend Service (.NET)  →  branch: homolog
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: memuvie-homolog
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    branch: homolog
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Homolog
      - key: ASPNETCORE_URLS
        value: http://+:8080

      - key: FRONTEND_URL
        value: https://memuvie-homolog.vercel.app

      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_FROM
        value: noreply@memuvie.com

      - key: UPLOAD_PATH
        value: /uploads/memuvie/

      # 🔒 Banco de dados HOMOLOG → Neon
      - key: DB_HOST
        value: ep-silent-feather-ankpy2rt-pooler.c-6.us-east-1.aws.neon.tech
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: neondb
      - key: DB_USER
        value: neondb_owner
      # 🔒 DB_PASSWORD → adicionar como Secret no Render Dashboard (não versionar)

      # 🔒 Demais segredos (adicionar via Render Dashboard):
      # - JWT_SECRET
      # - MAIL_USERNAME
      # - MAIL_PASSWORD
      # - CLOUDINARY_CLOUD_NAME (opcional)
      # - CLOUDINARY_API_KEY (opcional)
      # - CLOUDINARY_API_SECRET (opcional)

    healthCheckPath: /health
    healthCheckInterval: 30
    buildCommand: dotnet publish -c Release -o out --no-restore
    startCommand: dotnet EventoAPI.dll

  # ─────────────────────────────────────────────────────────────
  # PRD – Frontend Service (Angular)
  # ─────────────────────────────────────────────────────────────
  # Frontend Service (Angular)
  - type: web
    name: memuvie-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /

