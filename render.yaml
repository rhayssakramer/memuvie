services:
  # Backend Service (.NET)
  - type: web
    name: memuvie-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      # 🔐 Variáveis públicas apenas - Credenciais no Render Dashboard
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: FRONTEND_URL
        value: https://memuvie.vercel.app
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: UPLOAD_PATH
        value: /uploads/memuvie/
      # 🔒 Adicionar no Render Dashboard (não no código):
      # - DB_HOST
      # - DB_PORT
      # - DB_USER
      # - DB_PASSWORD
      # - JWT_SECRET
      # - MAIL_USERNAME
      # - MAIL_PASSWORD
      # - CLOUDINARY_CLOUD_NAME
      # - CLOUDINARY_API_KEY
      # - CLOUDINARY_API_SECRET
    healthCheckPath: /health

  # Frontend Service (Angular)
  - type: web
    name: memuvie-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /